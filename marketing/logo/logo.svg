<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <!-- Background dots -->
    <pattern id="bgDots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="3" fill="#111111" opacity="0.14" />
    </pattern>
    <!-- Grid dots -->
    <pattern id="gridDots" x="0" y="0" width="170" height="170" patternUnits="userSpaceOnUse">
      <circle cx="85" cy="85" r="5" fill="#111111" opacity="0.15" />
    </pattern>
    <!-- Obstacle stripes -->
    <pattern id="stripes" width="20" height="20" patternTransform="rotate(45 0 0)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="20" stroke="#111111" stroke-width="6" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="#fbf3d5" />
  <rect width="800" height="800" fill="url(#bgDots)" />

  <!-- Floating Decor -->
  <!-- Top Left -->
  <g transform="translate(70, 100) rotate(-10)">
    <rect x="8" y="8" width="60" height="60" rx="15" fill="#111111" />
    <rect x="0" y="0" width="60" height="60" rx="15" fill="#111111" />
    <rect x="5" y="5" width="50" height="50" rx="11" fill="#e56b6f" />
  </g>
  <!-- Top Right -->
  <g transform="translate(680, 80) rotate(15)">
    <rect x="10" y="10" width="70" height="70" rx="18" fill="#111111" />
    <rect x="0" y="0" width="70" height="70" rx="18" fill="#111111" />
    <rect x="6" y="6" width="58" height="58" rx="13" fill="#ffd96a" />
    <polygon points="25,20 25,50 45,35" fill="#111111" />
  </g>
  <!-- Bottom Left -->
  <g transform="translate(80, 650) rotate(-15)">
    <rect x="10" y="10" width="80" height="80" rx="20" fill="#111111" />
    <rect x="0" y="0" width="80" height="80" rx="20" fill="#111111" />
    <rect x="6" y="6" width="68" height="68" rx="15" fill="#7fb7e8" />
    <g transform="translate(40,40) scale(0.6)">
      <circle cx="-16" cy="0" r="14" stroke="#111111" stroke-width="6" fill="none" />
      <circle cx="16" cy="0" r="14" stroke="#111111" stroke-width="6" fill="none" />
      <rect x="-8" y="-5" width="16" height="10" fill="#111111" />
    </g>
  </g>
  <!-- Bottom Right -->
  <g transform="translate(650, 620) rotate(10)">
    <rect x="12" y="12" width="90" height="90" rx="22" fill="#111111" />
    <rect x="0" y="0" width="90" height="90" rx="22" fill="#111111" />
    <rect x="6" y="6" width="78" height="78" rx="17" fill="#b8e5c8" />
  </g>

  <!-- Central Grid (145, 145) -->
  <g transform="translate(145, 145)">
    <!-- Shadow -->
    <rect x="25" y="25" width="510" height="510" rx="45" fill="#111111" />
    <!-- Border -->
    <rect x="0" y="0" width="510" height="510" rx="45" fill="#111111" />
    <!-- Inner -->
    <rect x="12" y="12" width="486" height="486" rx="35" fill="#ffffff" />
    <!-- Dots -->
    <rect x="12" y="12" width="486" height="486" rx="35" fill="url(#gridDots)" />
    
    <!-- Exit Portal Right Row 1 -->
    <rect x="500" y="190" width="30" height="130" rx="8" fill="#111111" />
    <rect x="506" y="196" width="18" height="118" rx="5" fill="#ff8a5b" />
  </g>

  <!-- Blocks on Grid -->
  <!-- Block A: Red -->
  <g transform="translate(160, 160)">
    <rect x="18" y="18" width="140" height="140" rx="30" fill="#111111" />
    <rect x="0" y="0" width="140" height="140" rx="30" fill="#111111" />
    <rect x="10" y="10" width="120" height="120" rx="22" fill="#e56b6f" />
  </g>

  <!-- Block B: Yellow Constrained -->
  <g transform="translate(160, 330)">
    <rect x="18" y="18" width="310" height="140" rx="30" fill="#111111" />
    <rect x="0" y="0" width="310" height="140" rx="30" fill="#111111" />
    <rect x="10" y="10" width="290" height="120" rx="22" fill="#ffd96a" />
    <!-- Chevron Right -->
    <polygon points="135,45 135,95 175,70" fill="#111111" />
  </g>

  <!-- Block C: Blue Dependent -->
  <g transform="translate(500, 160)">
    <rect x="18" y="18" width="140" height="140" rx="30" fill="#111111" />
    <rect x="0" y="0" width="140" height="140" rx="30" fill="#111111" />
    <rect x="10" y="10" width="120" height="120" rx="22" fill="#7fb7e8" />
    <g transform="translate(70,70)">
      <circle cx="-16" cy="0" r="14" stroke="#111111" stroke-width="6" fill="none" />
      <circle cx="16" cy="0" r="14" stroke="#111111" stroke-width="6" fill="none" />
      <rect x="-8" y="-5" width="16" height="10" fill="#111111" />
    </g>
  </g>

  <!-- Block E: Mint -->
  <g transform="translate(330, 500)">
    <rect x="18" y="18" width="140" height="140" rx="30" fill="#111111" />
    <rect x="0" y="0" width="140" height="140" rx="30" fill="#111111" />
    <rect x="10" y="10" width="120" height="120" rx="22" fill="#b8e5c8" />
  </g>

  <!-- Block D: Obstacle -->
  <g transform="translate(500, 500)">
    <rect x="18" y="18" width="140" height="140" rx="30" fill="#111111" />
    <rect x="0" y="0" width="140" height="140" rx="30" fill="#111111" />
    <rect x="10" y="10" width="120" height="120" rx="22" fill="#4a4a4a" />
    <!-- Stripes -->
    <rect x="10" y="10" width="120" height="120" rx="22" fill="url(#stripes)" opacity="0.35" />
    <!-- Diagonal Cross / X -->
    <path d="M40 40 L100 100 M100 40 L40 100" stroke="#111111" stroke-width="12" stroke-linecap="round" opacity="0.6" />
  </g>
</svg>
